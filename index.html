<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0e17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>HitFactor 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0a0e17; color: #e0e6ed;
    overflow: hidden; touch-action: none;
    width: 100vw; height: 100vh; position: fixed;
  }

  #canvas-container { width: 100%; height: 100%; position: relative; }

  .overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }

  .title-bar {
    position: absolute; top: 12px; left: 16px;
    pointer-events: auto;
  }
  .title-bar h1 { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
  .title-bar p { font-size: 11px; color: #8899aa; margin-top: 2px; }

  .formula-box {
    position: absolute; top: 12px; right: 12px;
    background: rgba(15,20,35,0.88); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; padding: 10px 14px;
    backdrop-filter: blur(12px);
    pointer-events: auto;
  }
  .formula-box .label { font-size: 9px; text-transform: uppercase; letter-spacing: 1.2px; color: #667788; margin-bottom: 4px; }
  .formula-box .formula { font-size: 15px; font-weight: 600; color: #5cb8ff; font-family: 'Courier New', monospace; }
  .formula-box .partials { margin-top: 6px; font-size: 11px; color: #99aabb; line-height: 1.6; font-family: 'Courier New', monospace; }

  .legend {
    position: absolute; bottom: 16px; right: 12px;
    background: rgba(15,20,35,0.88); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; padding: 10px 14px;
    backdrop-filter: blur(12px);
    pointer-events: auto;
  }
  .legend .label { font-size: 9px; text-transform: uppercase; letter-spacing: 1.2px; color: #667788; margin-bottom: 6px; }
  .legend-bar { width: 160px; height: 12px; border-radius: 6px; margin-bottom: 4px; }
  .legend-labels { display: flex; justify-content: space-between; font-size: 10px; color: #8899aa; }

  .info-panel {
    position: absolute; bottom: 16px; left: 12px;
    background: rgba(15,20,35,0.88); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; padding: 10px 14px;
    backdrop-filter: blur(12px);
    pointer-events: auto;
    max-width: 220px;
  }
  .info-panel .label { font-size: 9px; text-transform: uppercase; letter-spacing: 1.2px; color: #667788; margin-bottom: 4px; }
  .info-panel .stat { font-size: 11px; color: #c0ccdd; margin: 2px 0; }
  .info-panel .stat span { color: #5cb8ff; font-weight: 600; }

  .hover-tooltip {
    position: absolute; display: none;
    background: rgba(10,14,23,0.92); border: 1px solid rgba(92,184,255,0.4);
    border-radius: 10px; padding: 10px 14px;
    backdrop-filter: blur(12px); pointer-events: none;
    z-index: 20; font-size: 12px; line-height: 1.5;
  }
  .hover-tooltip .ht-val { color: #5cb8ff; font-weight: 700; font-size: 16px; }
  .hover-tooltip .ht-label { color: #8899aa; }
  .hover-tooltip .ht-detail { color: #c0ccdd; }

  .controls-hint {
    position: absolute; top: 50%; left: 12px; transform: translateY(-50%);
    font-size: 10px; color: #334455; line-height: 1.7;
    pointer-events: none;
  }

  @media (min-width: 700px) {
    .title-bar h1 { font-size: 22px; }
    .formula-box { padding: 16px 20px; }
    .formula-box .formula { font-size: 18px; }
    .formula-box .partials { font-size: 13px; }
    .info-panel { max-width: 280px; }
    .info-panel .stat { font-size: 13px; }
    .legend-bar { width: 200px; }
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div class="overlay">
  <div class="title-bar">
    <h1>Hit Factor Surface</h1>
    <p>f(Points, Time) — Limited Optics</p>
  </div>

  <div class="formula-box">
    <div class="label">Function</div>
    <div class="formula">HF(P, T) = P / T</div>
    <div class="partials">
      &part;HF/&part;P = 1/T<br>
      &part;HF/&part;T = &minus;P/T&sup2;<br>
      &nabla;HF = &langle;1/T, &minus;P/T&sup2;&rangle;
    </div>
  </div>

  <div class="legend">
    <div class="label">Hit Factor</div>
    <canvas id="legend-bar" class="legend-bar" width="160" height="12"></canvas>
    <div class="legend-labels"><span>0</span><span>20</span><span>40</span></div>
  </div>

  <div class="info-panel">
    <div class="label">Domain</div>
    <div class="stat">Points: <span>50 — 200</span></div>
    <div class="stat">Time: <span>5s — 25s</span></div>
    <div class="stat">HF Range: <span>2.0 — 40.0</span></div>
    <div class="stat" style="margin-top:4px;color:#556677;font-size:10px;">1-finger drag: rotate<br>Pinch: zoom &bull; 2-finger: pan</div>
  </div>

  <div class="hover-tooltip" id="tooltip"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Scene
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0e17);
container.appendChild(renderer.domElement);

const P_MIN = 50, P_MAX = 200, T_MIN = 5, T_MAX = 25, HF_MAX = 40;
const GRID = 60, S = 10;

function norm(v, mn, mx) { return ((v - mn) / (mx - mn)) * S - S / 2; }

function hfColor(hf) {
  const t = Math.min(hf / HF_MAX, 1);
  let r, g, b;
  if (t < 0.25) { const s = t / 0.25; r = 0.05; g = 0.15 + 0.55 * s; b = 0.6 + 0.2 * s; }
  else if (t < 0.5) { const s = (t - 0.25) / 0.25; r = 0.1 * s; g = 0.7 + 0.15 * s; b = 0.8 - 0.4 * s; }
  else if (t < 0.75) { const s = (t - 0.5) / 0.25; r = 0.1 + 0.7 * s; g = 0.85 - 0.15 * s; b = 0.4 - 0.25 * s; }
  else { const s = (t - 0.75) / 0.25; r = 0.8 + 0.2 * s; g = 0.7 - 0.45 * s; b = 0.15 - 0.1 * s; }
  return new THREE.Color(r, g, b);
}

// Surface
const geo = new THREE.BufferGeometry();
const verts = [], cols = [], idx = [];
for (let i = 0; i <= GRID; i++) {
  for (let j = 0; j <= GRID; j++) {
    const P = P_MIN + (P_MAX - P_MIN) * (i / GRID);
    const T = T_MIN + (T_MAX - T_MIN) * (j / GRID);
    const HF = P / T;
    verts.push(norm(T, T_MIN, T_MAX), norm(Math.min(HF, HF_MAX), 0, HF_MAX), norm(P, P_MIN, P_MAX));
    const c = hfColor(HF); cols.push(c.r, c.g, c.b);
  }
}
for (let i = 0; i < GRID; i++) {
  for (let j = 0; j < GRID; j++) {
    const a = i * (GRID + 1) + j, b = a + 1, c = (i + 1) * (GRID + 1) + j, d = c + 1;
    idx.push(a, b, c, b, d, c);
  }
}
geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
geo.setAttribute('color', new THREE.Float32BufferAttribute(cols, 3));
geo.setIndex(idx); geo.computeVertexNormals();

const surface = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({
  vertexColors: true, side: THREE.DoubleSide, shininess: 40,
  transparent: true, opacity: 0.92, specular: new THREE.Color(0x224466)
}));
scene.add(surface);

// Wireframe
scene.add(new THREE.Mesh(geo.clone(), new THREE.MeshBasicMaterial({
  vertexColors: true, wireframe: true, transparent: true, opacity: 0.06
})));

// Gradient arrows
const AG = 7;
for (let i = 0; i <= AG; i++) {
  for (let j = 0; j <= AG; j++) {
    const P = P_MIN + (P_MAX - P_MIN) * (i / AG);
    const T = T_MIN + (T_MAX - T_MIN) * (j / AG);
    const HF = P / T;
    const x = norm(T, T_MIN, T_MAX), z = norm(P, P_MIN, P_MAX);
    const y = norm(Math.min(HF, HF_MAX), 0, HF_MAX);
    const dP = 1 / T, dT = -P / (T * T);
    const dir = new THREE.Vector3(dT * S / (T_MAX - T_MIN), (dP * S / (P_MAX - P_MIN) + dT * S / (T_MAX - T_MIN)) * 0.3, dP * S / (P_MAX - P_MIN)).normalize();
    const sc = Math.min(0.4, Math.sqrt(dP * dP + dT * dT) * 0.05) * 1.5;
    const c = hfColor(HF);
    scene.add(new THREE.ArrowHelper(dir, new THREE.Vector3(x, y + 0.08, z), sc, c.getHex(), sc * 0.35, sc * 0.2));
  }
}

// Contour lines
[5, 8, 10, 12, 15, 20, 25, 30, 35].forEach(hfL => {
  const pts = [];
  for (let k = 0; k <= 100; k++) {
    const P = P_MIN + (P_MAX - P_MIN) * (k / 100), T = P / hfL;
    if (T >= T_MIN && T <= T_MAX)
      pts.push(new THREE.Vector3(norm(T, T_MIN, T_MAX), norm(hfL, 0, HF_MAX) + 0.02, norm(P, P_MIN, P_MAX)));
  }
  if (pts.length > 1)
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({ color: hfColor(hfL), transparent: true, opacity: 0.6 })));
});

// Axes
function ax(f, t, c) {
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([f, t]),
    new THREE.LineBasicMaterial({ color: c, transparent: true, opacity: 0.5 })));
}
const h = S / 2, e = h + 0.5;
ax(new THREE.Vector3(-e, -h, -h), new THREE.Vector3(e, -h, -h), 0x4488aa);
ax(new THREE.Vector3(-h, -h, -h), new THREE.Vector3(-h, e, -h), 0x44aa66);
ax(new THREE.Vector3(-h, -h, -h), new THREE.Vector3(-h, -h, e), 0xaa6644);

// Labels
function mkLabel(text, pos, col, sz) {
  const cv = document.createElement('canvas'); cv.width = 256; cv.height = 64;
  const cx = cv.getContext('2d'); cx.font = `bold ${sz || 28}px sans-serif`;
  cx.fillStyle = col; cx.textAlign = 'center'; cx.fillText(text, 128, 40);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(cv), transparent: true }));
  sp.position.copy(pos); sp.scale.set(2.2, 0.58, 1); scene.add(sp);
}
mkLabel('Time (s)', new THREE.Vector3(0, -h - 0.8, -h - 0.5), '#5599cc');
mkLabel('Hit Factor', new THREE.Vector3(-h - 1.2, 0, -h - 0.3), '#55cc77');
mkLabel('Points', new THREE.Vector3(-h - 1.0, -h - 0.8, 0), '#cc8844');

function mkTick(text, pos, col) {
  const cv = document.createElement('canvas'); cv.width = 128; cv.height = 48;
  const cx = cv.getContext('2d'); cx.font = '22px sans-serif';
  cx.fillStyle = col || '#667788'; cx.textAlign = 'center'; cx.fillText(text, 64, 32);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(cv), transparent: true }));
  sp.position.copy(pos); sp.scale.set(1.3, 0.45, 1); scene.add(sp);
}
[5, 10, 15, 20, 25].forEach(t => mkTick(t + 's', new THREE.Vector3(norm(t, T_MIN, T_MAX), -h - 0.4, -h - 0.2), '#5599cc'));
[50, 100, 150, 200].forEach(p => mkTick(p + 'pt', new THREE.Vector3(-h - 0.6, -h - 0.4, norm(p, P_MIN, P_MAX)), '#cc8844'));
[0, 10, 20, 30, 40].forEach(f => mkTick(f + '', new THREE.Vector3(-h - 0.5, norm(f, 0, HF_MAX), -h - 0.2), '#55cc77'));

// Grid
const gm = new THREE.LineBasicMaterial({ color: 0x223344, transparent: true, opacity: 0.3 });
[5, 10, 15, 20, 25].forEach(t => { const x = norm(t, T_MIN, T_MAX); scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x, -h, -h), new THREE.Vector3(x, -h, h)]), gm)); });
[50, 100, 150, 200].forEach(p => { const z = norm(p, P_MIN, P_MAX); scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-h, -h, z), new THREE.Vector3(h, -h, z)]), gm)); });

// Lights
scene.add(new THREE.AmbientLight(0x334455, 0.6));
const dl = new THREE.DirectionalLight(0xffffff, 0.8); dl.position.set(5, 10, 5); scene.add(dl);
const dl2 = new THREE.DirectionalLight(0x4488aa, 0.3); dl2.position.set(-5, 3, -5); scene.add(dl2);

// Camera orbit
let theta = 0.8, phi = 0.6, radius = 17, panX = 0, panY = 0;
function updateCam() {
  camera.position.set(
    radius * Math.sin(phi) * Math.cos(theta) + panX,
    radius * Math.cos(phi) + panY,
    radius * Math.sin(phi) * Math.sin(theta) + panX * 0.3
  );
  camera.lookAt(panX, panY, 0);
}
updateCam();

// Touch controls
let touches = {};
let touchStartPos = null;
let touchMoved = false;
const TAP_THRESHOLD = 10;
const el = renderer.domElement;

el.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) touches[t.identifier] = { x: t.clientX, y: t.clientY };
  if (e.touches.length === 1) {
    touchStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    touchMoved = false;
  }
  autoRotate = false;
}, { passive: false });

el.addEventListener('touchmove', e => {
  e.preventDefault();
  if (touchStartPos && e.touches.length === 1) {
    const dx = e.touches[0].clientX - touchStartPos.x;
    const dy = e.touches[0].clientY - touchStartPos.y;
    if (Math.abs(dx) > TAP_THRESHOLD || Math.abs(dy) > TAP_THRESHOLD) touchMoved = true;
  } else { touchMoved = true; }
  const ids = Object.keys(touches);
  if (e.touches.length === 1 && ids.length >= 1) {
    const t = e.touches[0], prev = touches[t.identifier];
    if (prev) {
      theta -= (t.clientX - prev.x) * 0.006;
      phi = Math.max(0.1, Math.min(Math.PI - 0.1, phi - (t.clientY - prev.y) * 0.006));
      touches[t.identifier] = { x: t.clientX, y: t.clientY };
      updateCam();
    }
  } else if (e.touches.length === 2) {
    const t0 = e.touches[0], t1 = e.touches[1];
    const curDist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
    const p0 = touches[t0.identifier], p1 = touches[t1.identifier];
    if (p0 && p1) {
      const prevDist = Math.hypot(p1.x - p0.x, p1.y - p0.y);
      radius = Math.max(5, Math.min(40, radius - (curDist - prevDist) * 0.03));
      const dx = ((t0.clientX + t1.clientX) / 2) - ((p0.x + p1.x) / 2);
      const dy = ((t0.clientY + t1.clientY) / 2) - ((p0.y + p1.y) / 2);
      panX -= dx * 0.015; panY += dy * 0.015;
      updateCam();
    }
    touches[t0.identifier] = { x: t0.clientX, y: t0.clientY };
    touches[t1.identifier] = { x: t1.clientX, y: t1.clientY };
  }
}, { passive: false });

el.addEventListener('touchend', e => {
  const endTouch = e.changedTouches[0];
  if (!touchMoved && touchStartPos && e.touches.length === 0) {
    // This was a tap — raycast to surface
    const tapMouse = new THREE.Vector2(
      (endTouch.clientX / window.innerWidth) * 2 - 1,
      -(endTouch.clientY / window.innerHeight) * 2 + 1
    );
    const tapRay = new THREE.Raycaster();
    tapRay.setFromCamera(tapMouse, camera);
    const hits = tapRay.intersectObject(surface);
    if (hits.length) {
      const p = hits[0].point;
      const T = T_MIN + ((p.x + S / 2) / S) * (T_MAX - T_MIN);
      const P = P_MIN + ((p.z + S / 2) / S) * (P_MAX - P_MIN);
      const HF = P / T;
      tooltip.style.display = 'block';
      // Position tooltip centered above tap, clamped to screen
      let tx = endTouch.clientX - 100;
      let ty = endTouch.clientY - 120;
      tx = Math.max(8, Math.min(window.innerWidth - 216, tx));
      ty = Math.max(8, ty);
      tooltip.style.left = tx + 'px';
      tooltip.style.top = ty + 'px';
      tooltip.innerHTML = '<div class="ht-val">' + HF.toFixed(4) + ' HF</div>'
        + '<div class="ht-detail">' + P.toFixed(0) + 'pts in ' + T.toFixed(2) + 's</div>'
        + '<div style="margin-top:4px">'
        + '<span class="ht-label">&part;HF/&part;P = </span>' + (1/T).toFixed(4)
        + '<br><span class="ht-label">&part;HF/&part;T = </span>' + (-P/(T*T)).toFixed(4)
        + '</div>';
    } else {
      tooltip.style.display = 'none';
    }
  }
  touchStartPos = null;
  for (const t of e.changedTouches) delete touches[t.identifier];
});

// Mouse controls
let isDrag = false, isRight = false, prevMX, prevMY;
el.addEventListener('mousedown', e => { isDrag = true; isRight = e.button === 2; prevMX = e.clientX; prevMY = e.clientY; autoRotate = false; });
el.addEventListener('mousemove', e => {
  if (!isDrag) return;
  const dx = e.clientX - prevMX, dy = e.clientY - prevMY;
  if (isRight) { panX -= dx * 0.02; panY += dy * 0.02; }
  else { theta -= dx * 0.005; phi = Math.max(0.1, Math.min(Math.PI - 0.1, phi - dy * 0.005)); }
  prevMX = e.clientX; prevMY = e.clientY; updateCam();
});
window.addEventListener('mouseup', () => isDrag = false);
el.addEventListener('wheel', e => { radius = Math.max(5, Math.min(40, radius + e.deltaY * 0.01)); updateCam(); });
el.addEventListener('contextmenu', e => e.preventDefault());

// Tooltip (mouse hover)
const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');
el.addEventListener('mousemove', e => {
  if (isDrag) { tooltip.style.display = 'none'; return; }
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObject(surface);
  if (hits.length) {
    const p = hits[0].point;
    const T = T_MIN + ((p.x + S / 2) / S) * (T_MAX - T_MIN);
    const P = P_MIN + ((p.z + S / 2) / S) * (P_MAX - P_MIN);
    const HF = P / T;
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 16) + 'px'; tooltip.style.top = (e.clientY - 20) + 'px';
    tooltip.innerHTML = `<div class="ht-val">${HF.toFixed(4)} HF</div><div class="ht-detail">${P.toFixed(0)}pts in ${T.toFixed(2)}s</div><div style="margin-top:4px"><span class="ht-label">&part;HF/&part;P=</span>${(1/T).toFixed(4)} <span class="ht-label">&part;HF/&part;T=</span>${(-P/(T*T)).toFixed(4)}</div>`;
  } else tooltip.style.display = 'none';
});

// Legend
const lc = document.getElementById('legend-bar').getContext('2d');
for (let i = 0; i < 160; i++) { const c = hfColor((i / 160) * HF_MAX); lc.fillStyle = `rgb(${c.r*255|0},${c.g*255|0},${c.b*255|0})`; lc.fillRect(i, 0, 1, 12); }

// Animate
let autoRotate = true;
(function anim() {
  requestAnimationFrame(anim);
  if (autoRotate) { theta += 0.002; updateCam(); }
  renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Dismiss tooltip on tap outside surface
document.addEventListener('touchstart', e => {
  if (e.target === renderer.domElement) return;
  tooltip.style.display = 'none';
});

// Register service worker
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
